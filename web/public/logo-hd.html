<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; }
html, body { width:2800px; height:2800px; background:#000; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<svg width="2800" height="2800" viewBox="0 0 2800 2800" xmlns="http://www.w3.org/2000/svg">

  <!-- Black background -->
  <rect width="2800" height="2800" fill="#000"/>

  <!-- Blue rounded-square icon background -->
  <rect x="130" y="130" width="2540" height="2540" rx="560" ry="560" fill="#0000FF"/>

  <!--
    Cat face composed of:
    1. White left ear (wide triangle, rounded tip)
    2. White right ear (wide triangle, rounded tip)
    3. White head ellipse (large blob)
    4. Blue notch polygon (cuts between ears)
    5. Blue eye circles
  -->

  <!-- Left ear — wide triangle -->
  <path
    d="M 1040,630 C 1000,800 900,1050 820,1280 C 900,1290 1020,1290 1220,1250 C 1180,1080 1130,890 1040,630 Z"
    fill="white"
  />

  <!-- Right ear — wide triangle (mirror) -->
  <path
    d="M 1760,630 C 1800,800 1900,1050 1980,1280 C 1900,1290 1780,1290 1580,1250 C 1620,1080 1670,890 1760,630 Z"
    fill="white"
  />

  <!-- Head blob — large rounded ellipse -->
  <ellipse cx="1400" cy="1720" rx="800" ry="680" fill="white"/>

  <!-- Blue notch between ears — concave V pointing down -->
  <polygon points="1150,1220 1650,1220 1400,1420" fill="#0000FF"/>

  <!-- Left eye -->
  <circle cx="1140" cy="1660" r="135" fill="#0000FF"/>

  <!-- Right eye -->
  <circle cx="1660" cy="1660" r="135" fill="#0000FF"/>

</svg>
</body>
</html>
